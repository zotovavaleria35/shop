<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
    </header>

    <main>
        <p>{{ content }}</p>
    </main>

    <nav>
        {% if show_link_to_other %}
            <p>Посилання на інші сторінки:</p>
            <a href="{% url 'other_page' %}">Перейти на другу сторінку</a>
        {% else %}
            <p>Навігація:</p>
            <a href="{% url 'home' %}">Повернутися на головну</a>
        {% endif %}
    </nav>
</body>
</html>
